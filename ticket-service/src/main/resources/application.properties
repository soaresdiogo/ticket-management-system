spring.application.name=ticket-service
server.port=${SERVER_PORT:8082}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tms_tickets}
spring.datasource.username=${DB_USER:tms}
spring.datasource.password=${DB_PASSWORD:tms}

# Flyway: baseline on existing schema from init-dbs.sql; only run migrations with version > 1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
