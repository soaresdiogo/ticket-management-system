# Test: in-memory and stubs so context loads without external services (CI).

# H2 in-memory DB (replaces PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT keys (test keys generated in target/test-keys)
auth.jwt.key-dir=target/test-keys

# Redis + Spring AI Redis — exclude so no broker required (MfaCodeStorage provided by @MockBean)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

# Mail (dummy — context loads without connecting)
spring.mail.host=localhost
spring.mail.port=3025
