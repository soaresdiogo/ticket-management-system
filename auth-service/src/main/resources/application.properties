spring.application.name=auth-service
spring.datasource.url=jdbc:postgresql://localhost:5432/tms_auth
spring.datasource.username=tms
spring.datasource.password=tms

# Flyway: baseline on existing schema from init-dbs.sql; only run migrations with version > 1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT RS256: prefer .env with PEM content (AUTH_JWT_PRIVATE_KEY, AUTH_JWT_PUBLIC_KEY). Optional file paths below; leave empty to use env or auto-generate.
auth.jwt.private-key-path=
auth.jwt.public-key-path=
auth.jwt.key-dir=keys
# Key alias when reading from PEM (optional)
auth.jwt.key-id=tms-auth
