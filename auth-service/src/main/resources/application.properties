spring.application.name=auth-service
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tms_auth}
spring.datasource.username=${DB_USER:tms}
spring.datasource.password=${DB_PASSWORD:tms}

# Flyway: baseline on existing schema from init-dbs.sql; only run migrations with version > 1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT RS256: optional PEM content via AUTH_JWT_PRIVATE_KEY, AUTH_JWT_PUBLIC_KEY env vars
auth.jwt.private-key-path=${AUTH_JWT_PRIVATE_KEY_PATH:}
auth.jwt.public-key-path=${AUTH_JWT_PUBLIC_KEY_PATH:}
auth.jwt.key-dir=${AUTH_JWT_KEY_DIR:keys}
auth.jwt.key-id=${AUTH_JWT_KEY_ID:tms-auth}

# Redis: MFA code storage
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# MFA: code length and TTL in seconds
auth.mfa.code-length=${AUTH_MFA_CODE_LENGTH:6}
auth.mfa.ttl-seconds=${AUTH_MFA_TTL_SECONDS:300}

# Resend: send MFA code by email
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:TMS Auth <noreply@example.com>}
