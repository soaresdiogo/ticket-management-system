# CI: compile, test, and local static analysis (Checkstyle, PMD, SpotBugs).
# Runs on every push and pull request to main/master. No server or token required.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.connectionManager.ttlSeconds=120

jobs:
  build-test-lint:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test, and run linters
        run: ./mvnw -B clean verify
