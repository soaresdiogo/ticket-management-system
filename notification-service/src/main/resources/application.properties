spring.application.name=notification-service
server.port=${SERVER_PORT:8084}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tms_notifications}
spring.datasource.username=${DB_USER:tms}
spring.datasource.password=${DB_PASSWORD:tms}

# Flyway: baseline on existing schema from init-dbs.sql; only run migrations with version > 1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Skip checksum validation so edited applied migrations do not block startup (dev-friendly)
spring.flyway.validate-on-migrate=false

# Kafka consumer (set notification-service.kafka.enabled=false in tests to disable)
notification-service.kafka.enabled=${NOTIFICATION_KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Notification service Kafka topics
notification-service.kafka.topic.status-changed=ticket.status.changed
notification-service.kafka.topic.document-uploaded=ticket.document.uploaded

# Auth service (for user email lookup)
notification-service.auth-service.base-url=${AUTH_SERVICE_URL:http://localhost:8081}

# Resend: send notification emails
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:TMS Notifications <noreply@example.com>}

# Spring Doc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
