# Test profile: in-memory and stubs so context loads without external services (CI).

# H2 in-memory DB (replaces PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway (same behaviour as main; H2 compatible with flyway-database-h2)
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Disable Kafka so no broker is required (no Kafka listeners in this service yet)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
