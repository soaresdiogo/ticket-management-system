# Test profile: in-memory and stubs so context loads without external services (CI).

# H2 in-memory DB (replaces PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway disabled for tests — migration uses PostgreSQL-only syntax; Hibernate creates schema from entities
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create

# Disable Kafka listeners and config so no broker is required in tests
notification-service.kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Auth and Resend (stubbed in tests via mocks or not called)
notification-service.auth-service.base-url=http://localhost:8081
resend.api-key=test-key
resend.from-email=Test <noreply@test.com>
