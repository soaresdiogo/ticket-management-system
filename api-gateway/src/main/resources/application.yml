# API Gateway — TMS
# Single entry point; routes are configured per backend service.
# Override service URLs via env (e.g. AUTH_SERVICE_URL=http://auth-service:8080 for Docker).

auth:
  service:
    # Base URL of auth-service (used to fetch JWT public key for validation)
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

# CORS: allowed origins for the Angular app. Override via gateway.cors.allowed-origins (list) or env.
gateway:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age-seconds: 3600

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/auth/**

            - id: ticket-service
              uri: ${TICKET_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/tickets/**

            - id: file-service
              uri: ${FILE_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/files/**

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/notifications/**
