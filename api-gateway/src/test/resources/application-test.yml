# Test profile: disable discovery and ensure gateway routes are loaded (same as main config)
spring:
  cloud:
    discovery:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
            - id: ticket-service
              uri: http://localhost:8082
              predicates:
                - Path=/tickets/**
            - id: file-service
              uri: http://localhost:8083
              predicates:
                - Path=/files/**
            - id: notification-service
              uri: http://localhost:8084
              predicates:
                - Path=/notifications/**
