# Test profile: disable discovery; route URIs use placeholders so tests can inject WireMock base URL
spring:
  cloud:
    discovery:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/auth/**
            - id: ticket-service
              uri: ${TICKET_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/tickets/**
            - id: file-service
              uri: ${FILE_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/files/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/notifications/**
