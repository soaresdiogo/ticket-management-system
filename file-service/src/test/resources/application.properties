# Test: in-memory so context loads without external services (CI).

# H2 in-memory DB (replaces PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway disabled for tests — migration uses PostgreSQL-only syntax (gen_random_uuid); Hibernate creates schema from entities
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create

# MinIO — dummy values so MinioProperties binds; no real MinIO required for context load
minio.endpoint=http://localhost:9999
minio.access-key=test
minio.secret-key=test
minio.bucket=test-bucket
minio.presigned-expiry-seconds=60
