spring.application.name=file-service
server.port=${SERVER_PORT:8083}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tms_files}
spring.datasource.username=${DB_USER:tms}
spring.datasource.password=${DB_PASSWORD:tms}

# Flyway: baseline on existing schema from init-dbs.sql; only run migrations with version > 1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Skip checksum validation so edited applied migrations do not block startup (dev-friendly)
spring.flyway.validate-on-migrate=false

# MinIO (S3-compatible). Override via env: MINIO_ENDPOINT, MINIO_ACCESS_KEY, MINIO_SECRET_KEY, MINIO_BUCKET
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:tms}
minio.secret-key=${MINIO_SECRET_KEY:tms12345}
minio.bucket=${MINIO_BUCKET:tms-files}
minio.presigned-expiry-seconds=900

# Kafka (for ticket.document.uploaded events)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.delivery.timeout.ms=120000

# File upload (max size in bytes, allowed MIME types)
file-service.upload.max-size-bytes=10485760
file-service.upload.allowed-content-types=application/pdf,image/jpeg,image/png,image/jpg,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
file-service.kafka.topic.document-uploaded=ticket.document.uploaded
